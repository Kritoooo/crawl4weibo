name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-22.04
    environment:
      name: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          if ! [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match v<major>.<minor>.<patch>. Got ${tag_name}"
            exit 1
          fi

          git fetch origin main --tags

          tag_commit="$(git rev-list -n 1 "${tag_name}")"
          main_head="$(git rev-parse origin/main)"

          if [ "${tag_commit}" != "${main_head}" ]; then
            echo "::error::Release tags must point at the latest origin/main commit."
            echo "::error::Tag ${tag_name} -> ${tag_commit}"
            echo "::error::origin/main -> ${main_head}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        env:
          UV_TRUSTED_PUBLISHING: always
        run: uv publish

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --generate-notes \
            --fail-on-no-commits \
            --title "Release ${GITHUB_REF_NAME}"
